<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cadastro — Carona Universitária</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-logo">
        <div style="display:flex;align-items:center;justify-content:center;gap:0.5rem;margin-bottom:0.5rem;">
          <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="var(--primary)" stroke-width="2">
            <path d="M5 17H3a2 2 0 01-2-2V5a2 2 0 012-2h11a2 2 0 012 2v3"/>
            <rect x="9" y="11" width="14" height="10" rx="2"/>
            <circle cx="12" cy="21" r="1"/><circle cx="20" cy="21" r="1"/>
          </svg>
          <h1>Carona Uni</h1>
        </div>
        <p>Crie sua conta gratuitamente</p>
      </div>

      <form id="registerForm" novalidate>
        <div class="form-group">
          <label for="name">Nome completo</label>
          <div class="input-icon-wrap">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            <input type="text" id="name" placeholder="Seu nome completo" required autocomplete="name" />
          </div>
        </div>

        <div class="form-group">
          <label for="email">E-mail</label>
          <div class="input-icon-wrap">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
            <input type="email" id="email" placeholder="seu@email.com" required autocomplete="email" />
          </div>
        </div>

        <div class="form-group">
          <label for="phone">Telefone / WhatsApp</label>
          <div class="input-icon-wrap">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.07 9.81 19.79 19.79 0 01.03 1.22 2 2 0 012 0h3a2 2 0 012 1.72 12.84 12.84 0 00.7 2.81 2 2 0 01-.45 2.11L6.09 7.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45 12.84 12.84 0 002.81.7A2 2 0 0122 14.14v2.78z"/></svg>
            <input type="tel" id="phone" placeholder="(11) 99999-9999" required autocomplete="tel" />
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="password">Senha</label>
            <div class="input-icon-wrap">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
              <input type="password" id="password" placeholder="Mínimo 6 caracteres" required autocomplete="new-password" />
            </div>
          </div>
          <div class="form-group">
            <label for="confirmPassword">Confirmar senha</label>
            <div class="input-icon-wrap">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
              <input type="password" id="confirmPassword" placeholder="Repita a senha" required autocomplete="new-password" />
            </div>
          </div>
        </div>

        <div id="registerError" class="hidden" style="background:#FFEBEE;color:var(--danger);padding:0.75rem;border-radius:var(--radius-sm);font-size:0.875rem;margin-bottom:1rem;display:flex;align-items:center;gap:0.5rem;">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
          <span id="registerErrorMsg"></span>
        </div>

        <button type="submit" class="btn btn-primary btn-block btn-lg" id="registerBtn">
          Criar conta
        </button>
      </form>

      <p class="text-center text-sm mt-2">
        Já tem conta?
        <a href="/login.html" style="font-weight:600;">Entrar</a>
      </p>

      <p class="text-center mt-1">
        <a href="/" class="btn btn-ghost btn-sm">← Voltar ao início</a>
      </p>
    </div>
  </div>

  <div class="toast-container" id="toastContainer"></div>
  <script src="/js/app.js"></script>
  <script src="/js/register.js"></script>
</body>
</html>
