<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Buscar Caronas — Carona Universitária</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <nav class="navbar">
    <div class="navbar-inner">
      <a href="/" class="navbar-brand">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 17H3a2 2 0 01-2-2V5a2 2 0 012-2h11a2 2 0 012 2v3"/><rect x="9" y="11" width="14" height="10" rx="2"/><circle cx="12" cy="21" r="1"/><circle cx="20" cy="21" r="1"/></svg>
        Carona Uni
      </a>
      <button class="hamburger" id="hamburger"><span></span><span></span><span></span></button>
      <ul class="navbar-links" id="navLinks">
        <li><a href="/">Início</a></li>
        <li><a href="/find-rides.html" class="active">Buscar Caronas</a></li>
        <li id="navLoggedOut"><a href="/login.html">Entrar</a></li>
        <li id="navLoggedOut2"><a href="/register.html" class="btn-nav">Cadastrar</a></li>
        <li id="navLoggedIn" style="display:none;">
          <div class="navbar-user" id="userMenu">
            <div id="navAvatarWrap"></div>
            <span id="navUserName"></span>
            <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M7 10l5 5 5-5z"/></svg>
            <div class="dropdown-menu" id="dropdownMenu">
              <a href="/dashboard.html">Dashboard</a>
              <a href="/offer-ride.html">Oferecer Carona</a>
              <a href="/my-rides.html">Minhas Caronas</a>
              <a href="/profile.html">Meu Perfil</a>
              <hr/>
              <a href="#" class="danger" id="logoutBtn">Sair</a>
            </div>
          </div>
        </li>
      </ul>
    </div>
  </nav>

  <div class="page-header">
    <div class="page-header-inner">
      <h1>Buscar caronas</h1>
      <p>Encontre caronas disponíveis para o seu destino</p>
    </div>
  </div>

  <div class="container">
    <!-- FILTROS -->
    <div class="filter-bar">
      <form id="filterForm">
        <div class="form-group">
          <label>Origem</label>
          <input type="text" id="filterOrigin" placeholder="De onde?" />
        </div>
        <div class="form-group">
          <label>Destino</label>
          <input type="text" id="filterDest" placeholder="Para onde?" />
        </div>
        <div class="form-group">
          <label>Data</label>
          <input type="date" id="filterDate" />
        </div>
        <div style="display:flex;gap:0.5rem;align-items:flex-end;">
          <button type="submit" class="btn btn-primary">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            Filtrar
          </button>
          <button type="button" class="btn btn-ghost" id="clearFilters">Limpar</button>
        </div>
      </form>
    </div>

    <div class="flex justify-between items-center mb-2">
      <p class="text-muted text-sm" id="resultsCount"></p>
    </div>

    <div id="ridesContainer" class="rides-grid">
      <div class="loader"><div class="spinner"></div></div>
    </div>
  </div>

  <div class="toast-container" id="toastContainer"></div>
  <script src="/js/app.js"></script>
  <script src="/js/find-rides.js"></script>
</body>
</html>
